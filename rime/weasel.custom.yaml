patch:
  style/+:
    color_scheme: jwu
    color_scheme_dark: jwu
    font_point: 12
    label_font_point: 10
    comment_font_point: 10
    horizontal: true
    inline_preedit: true
    label_format: "%s"
    layout:
      align_type: bottom
      shadow_radius: 4                       # 阴影区域半径，为 0 不显示阴影；需要同时在配色方案中指定非透明的阴影颜色
      shadow_offset_x: 1                     # 阴影左右偏移距离
      shadow_offset_y: 1                     # 阴影上下偏移距离
      corner_radius: 4
      round_corner: 4                        # 候选背景色块圆角半径，又名 hilited_corner_radius
      border_width: 1
      margin_x: 0                            # 主体元素和候选框的左右边距；为负值时，不显示候选框
      margin_y: 0                            # 主体元素的上下边距；为负值时，不显示候选框
      hilite_spacing: 4                      # 候选项和相应标签的间距
      hilite_padding: 4                      # 高亮区域和内部文字的间距，影响高亮区域大小

  preset_color_schemes/jwu:
    name: jwu
    author: Johnny Wu
    back_color: 0xFFFFFF
    text_color: 0x424242
    hilited_candidate_text_color: 0xEE6E00
    hilited_candidate_back_color: 0xFFF0E4
    comment_text_color: 0x999999
    shadow_color: 0x33000000
    border_color: 0x8E8E8E
    # candidate_border_color: 0x000000
    hilited_candidate_border_color: 0x8E8E8E
